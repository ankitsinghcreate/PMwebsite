  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <style>\n    *{box-sizing:border-box}\n    html,body{margin:0;padding:0;background:#0A0A0B}\n    html{scroll-behavior:smooth}\n    ::selection{background:#3EFF8A;color:#0A0A0B}\n    a{color:#F5F4F0;text-decoration:none}\n    a:hover{color:var(--accent)}\n  <\u002Fstyle>\n  \n<\u002Fhelmet>\n<div style=\"position:relative;background:#0A0A0B;min-height:100vh;font-family:'Space Grotesk',sans-serif;overflow-x:hidden;--accent:{{ accentHex }}\">\n\n  <nav style=\"position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:64px;background:rgba(10,10,11,0.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.1)\">\n    <a href=\"#top\" style=\"font-family:'Bitter',serif;font-weight:700;font-size:19px;color:#F5F4F0;letter-spacing:-0.02em\">Ankit Singh<\u002Fa>\n    <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n      <button sc-camel-on-click=\"{{ toggleMenu }}\" aria-label=\"Menu\" style=\"background:none;border:2px solid #F5F4F0;color:#F5F4F0;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0\">\n        <span style=\"font-size:18px;line-height:1\">☰<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ !isMobile }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;align-items:center;gap:26px\">\n        <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <a href=\"{{ item.href }}\" style=\"font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:{{ item.color }};padding-bottom:4px;border-bottom:2px solid {{ item.borderColor }}\">{{ item.label }}<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fnav>\n\n  <sc-if value=\"{{ mobileMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:99;background:#0A0A0B;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:20px;padding:40px\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n        <a href=\"{{ item.href }}\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"font-family:'Bitter',serif;font-weight:700;font-size:30px;color:{{ item.color }}\">{{ item.label }}<\u002Fa>\n      <\u002Fsc-for>\n      <button sc-camel-on-click=\"{{ closeMenu }}\" aria-label=\"Close\" style=\"position:absolute;top:20px;right:20px;background:none;border:2px solid #F5F4F0;color:#F5F4F0;width:38px;height:38px;cursor:pointer\">✕<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div id=\"top\" style=\"position:relative;padding:104px 20px 64px;max-width:1240px;margin:0 auto\">\n    <div style=\"display:grid;grid-template-columns:{{ heroGridCols }};gap:24px;align-items:stretch\">\n      <div style=\"display:flex;flex-direction:column;justify-content:center;gap:22px\">\n        <div style=\"font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent)\">Product Manager — Fintech &amp; Growth<\u002Fdiv>\n        <h1 style=\"font-family:'Bitter',serif;font-weight:800;font-size:clamp(2.1rem,5.2vw,3.9rem);line-height:1.04;letter-spacing:-0.01em;color:#F5F4F0;margin:0\">I ship validated products, not slide decks.<\u002Fh1>\n        <div style=\"display:flex;align-items:center;gap:14px\">\n          <div style=\"display:flex\">\n            <sc-for list=\"{{ badges }}\" as=\"b\" hint-placeholder-count=\"3\">\n              <div title=\"{{ b.title }}\" style=\"width:38px;height:38px;border-radius:50%;background:#F5F4F0;color:#0A0A0B;border:2px solid #0A0A0B;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-left:-10px;cursor:default\">{{ b.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <span style=\"font-size:12.5px;color:rgba(245,244,240,0.55);font-weight:600\">Banking sales → fintech PM<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:100%;height:1px;background:rgba(245,244,240,0.15)\"><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:auto 1fr;gap:20px\">\n          <span style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(245,244,240,0.45);white-space:nowrap\">What I do<\u002Fspan>\n          <p style=\"font-size:14.5px;line-height:1.55;color:rgba(245,244,240,0.75);margin:0\">Research, a documented decision trail, and a working prototype for every product I ship — not just a PRD.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:6px\">\n          <a href=\"#case-studies-grid\" style=\"display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#0A0A0B;font-weight:700;font-size:14px;letter-spacing:0.03em;text-transform:uppercase;padding:14px 22px;border:2px solid #0A0A0B;box-shadow:6px 6px 0 #F5F4F0;transition:transform .15s ease-out\" style-hover=\"transform:translate(-2px,-2px)\">View case studies<\u002Fa>\n          <a href=\"https://drive.google.com/drive/folders/1zkHa4Ky08BzpkVYLyQJ6MZA9wUXLpPds?usp=sharing\" style=\"display:inline-flex;align-items:center;gap:8px;color:#F5F4F0;font-weight:600;font-size:14px;border-bottom:2px solid rgba(245,244,240,0.3);padding-bottom:2px\">Download résumé ↓<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div ref=\"{{ photoCardRef }}\" sc-camel-on-mouse-move=\"{{ handleCardMouseMove }}\" sc-camel-on-mouse-leave=\"{{ handleCardMouseLeave }}\" style=\"position:relative;background:var(--accent);border:2px solid #0A0A0B;box-shadow:10px 10px 0 #F5F4F0;padding:18px;display:flex;flex-direction:column;min-height:{{ photoCardMinHeight }};will-change:transform\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between\">\n          <div style=\"font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#0A0A0B;line-height:1.3\">Product<br>Manager<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <div style=\"display:flex;gap:5px\">\n              <span style=\"width:6px;height:6px;border-radius:50%;background:#0A0A0B\"><\u002Fspan>\n              <span style=\"width:6px;height:6px;border-radius:50%;background:rgba(10,10,11,0.3)\"><\u002Fspan>\n            <\u002Fdiv>\n            <a href=\"#\" aria-label=\"About\" style=\"width:34px;height:34px;border-radius:50%;background:#0A0A0B;color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;flex:none\">↗<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <img src=\"ba6b7314-8af3-4db4-9976-d359511dec2c\" alt=\"Ankit Singh\" style=\"flex:1;width:100%;object-fit:cover;object-position:top;border:2px solid #0A0A0B;margin-top:14px;min-height:220px;pointer-events:none\">\n        <a href=\"Contact.dc.html\" style=\"margin-top:14px;display:flex;align-items:center;justify-content:space-between;background:#F5F4F0;color:#0A0A0B;border:2px solid #0A0A0B;padding:12px 16px;font-weight:700;font-size:13.5px;text-transform:uppercase;letter-spacing:0.03em;transition:background .15s ease-out, color .15s ease-out\" style-hover=\"background:#0A0A0B;color:#F5F4F0\">\n          <span>Let's talk<\u002Fspan><span>→<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:24px\">\n      <div style=\"background:#0A0A0B;border:2px solid rgba(245,244,240,0.15);padding:24px;display:flex;flex-direction:column;gap:14px\">\n        <div style=\"width:34px;height:34px;position:relative\">\n          <span style=\"position:absolute;left:0;top:0;width:20px;height:20px;background:var(--accent)\"><\u002Fspan>\n          <span style=\"position:absolute;right:0;bottom:0;width:20px;height:20px;background:#F5F4F0\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:600;color:rgba(245,244,240,0.8);line-height:1.5\">End-to-end product: research, decision trail, working prototype.<\u002Fdiv>\n      <\u002Fdiv>\n      <a href=\"#case-studies-grid\" style=\"background:#F5F4F0;border:2px solid #0A0A0B;padding:24px;display:flex;flex-direction:column;justify-content:space-between;gap:14px;color:#0A0A0B;box-shadow:8px 8px 0 var(--accent);transition:transform .15s ease-out\" style-hover=\"transform:translate(-3px,-3px)\">\n        <span style=\"font-size:20px\">↗<\u002Fspan>\n        <div style=\"font-family:'Bitter',serif;font-weight:700;font-size:19px;line-height:1.2\">Case studies<\u002Fdiv>\n      <\u002Fa>\n      <div style=\"background:var(--accent);border:2px solid #0A0A0B;padding:24px;display:flex;flex-direction:column;gap:6px;justify-content:center\">\n        <div style=\"font-family:'Bitter',serif;font-weight:800;font-size:44px;line-height:1;color:#0A0A0B\">04<\u002Fdiv>\n        <div style=\"font-size:12.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#0A0A0B\">Case studies shipped<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"case-studies-grid\" style=\"position:relative;z-index:2;background:#0A0A0B;padding:64px 24px 120px\">\n    <div style=\"max-width:1180px;margin:0 auto\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:44px\">\n        <div>\n          <div style=\"font-size:12.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px\">Selected work<\u002Fdiv>\n          <h2 style=\"font-family:'Bitter',serif;font-weight:800;font-size:clamp(1.7rem,3vw,2.4rem);color:#F5F4F0;margin:0\">Case studies<\u002Fh2>\n        <\u002Fdiv>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:rgba(245,244,240,0.5)\">Research → decision → prototype → impact<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:22px\">\n        <sc-for list=\"{{ caseStudies }}\" as=\"cs\" hint-placeholder-count=\"4\">\n          <a href=\"{{ cs.href }}\" style=\"position:relative;overflow:hidden;display:flex;flex-direction:column;gap:16px;background:#F5F4F0;color:#0A0A0B;padding:28px;border:2px solid #0A0A0B;box-shadow:10px 10px 0 #ffffff;transition:box-shadow 0.18s ease-out, transform 0.18s ease-out\" style-hover=\"box-shadow:10px 10px 0 var(--accent);transform:translate(-4px,-4px)\">\n            <span style=\"position:absolute;top:6px;right:16px;font-family:'Bitter',serif;font-weight:800;font-size:56px;color:rgba(10,10,11,0.06);line-height:1;pointer-events:none;z-index:0\">{{ cs.index }}<\u002Fspan>\n            <div style=\"position:relative;z-index:1;display:flex;align-items:center;gap:8px;padding-right:70px\">\n              <span style=\"width:8px;height:8px;background:var(--accent);flex:none\"><\u002Fspan>\n              <span style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(10,10,11,0.55)\">{{ cs.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"position:relative;font-family:'Bitter',serif;font-weight:700;font-size:22px;line-height:1.15;margin:0;color:#0A0A0B\">{{ cs.title }}<\u002Fh3>\n            <p style=\"position:relative;font-size:14.5px;line-height:1.5;color:rgba(10,10,11,0.72);margin:0\">{{ cs.hook }}<\u002Fp>\n            <div style=\"position:relative;background:color-mix(in srgb, var(--accent) 16%, transparent);border-left:3px solid var(--accent);padding:10px 14px\">\n              <div style=\"font-size:10.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(10,10,11,0.55);margin-bottom:4px\">Outcome target<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:700;line-height:1.4;color:#0A0A0B\">{{ cs.metric }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"position:relative;font-size:12.5px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#0A0A0B;margin-top:auto\">View case study →<\u002Fspan>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <footer style=\"position:relative;z-index:2;background:#0A0A0B;border-top:1px solid rgba(255,255,255,0.1);padding:56px 24px 40px\">\n    <div style=\"max-width:1180px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;gap:36px\">\n      <div style=\"max-width:360px\">\n        <div style=\"font-family:'Bitter',serif;font-weight:800;font-size:22px;color:#F5F4F0;margin-bottom:10px\">Ankit Singh<\u002Fdiv>\n        <div style=\"font-size:13px;color:rgba(245,244,240,0.55);line-height:1.6\">Product manager building validated fintech and consumer growth products — from research to working prototype.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:48px\">\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <span style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(245,244,240,0.4)\">Navigate<\u002Fspan>\n          <a href=\"#top\" style=\"font-size:14px;color:rgba(245,244,240,0.8)\">Home<\u002Fa>\n          <a href=\"#case-studies-grid\" style=\"font-size:14px;color:rgba(245,244,240,0.8)\">Projects<\u002Fa>\n          <a href=\"#\" style=\"font-size:14px;color:rgba(245,244,240,0.8)\">About<\u002Fa>\n          <a href=\"https://drive.google.com/drive/folders/1zkHa4Ky08BzpkVYLyQJ6MZA9wUXLpPds?usp=sharing\" style=\"font-size:14px;color:rgba(245,244,240,0.8)\">Resume<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <span style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(245,244,240,0.4)\">Contact<\u002Fspan>\n          <a href=\"mailto:hello@ankitsingh.com\" style=\"font-size:14px;color:rgba(245,244,240,0.8)\">ankitsingh.20029@gmail.com<br><\u002Fa>\n          <a href=\"https://www.linkedin.com/in/ankit-singh-1b2b30277/\" style=\"font-size:14px;color:rgba(245,244,240,0.8)\">LinkedIn<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1180px;margin:32px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,0.08);font-size:12px;color:rgba(245,244,240,0.35)\">© 2026 Ankit Singh. Built with a lot of PRDs.<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;green&quot;,&quot;options&quot;:[&quot;green&quot;,&quot;yellow&quot;,&quot;coral&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  state = { isMobile: (typeof window !== 'undefined' && window.innerWidth < 900), mobileMenuOpen: false };\n  photoCardRef = React.createRef();\n\n  handleCardMouseMove = (e) => {\n    if (this.state.isMobile) return;\n    const el = this.photoCardRef.current;\n    if (!el) return;\n    const r = el.getBoundingClientRect();\n    const px = (e.clientX - r.left) / r.width - 0.5;\n    const py = (e.clientY - r.top) / r.height - 0.5;\n    el.style.transition = 'transform 0.06s linear';\n    el.style.transform = `perspective(900px) rotateX(${py * -9}deg) rotateY(${px * 9}deg) scale3d(1.015,1.015,1.015)`;\n  };\n\n  handleCardMouseLeave = () => {\n    const el = this.photoCardRef.current;\n    if (!el) return;\n    el.style.transition = 'transform 0.5s cubic-bezier(0.16,1,0.3,1)';\n    el.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)';\n  };\n\n  componentDidMount() {\n    this.onResize = () => this.setState({ isMobile: window.innerWidth < 900 });\n    window.addEventListener('resize', this.onResize);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this.onResize);\n  }\n\n  accentHexFor(name) {\n    const map = { green: '#3EFF8A', yellow: '#E8FF3E', coral: '#FF5A3C' };\n    return map[name] || map.green;\n  }\n\n  toggleMenu = () => this.setState(s => ({ mobileMenuOpen: !s.mobileMenuOpen }));\n  closeMenu = () => this.setState({ mobileMenuOpen: false });\n\n  renderVals() {\n    const accentHex = this.accentHexFor(this.props.accentColor || 'green');\n    const isMobile = this.state.isMobile;\n\n    const nav = [\n      { label: 'Home', href: '#top', active: true },\n      { label: 'Projects', href: '#case-studies-grid', active: false },\n      { label: 'About', href: '#', active: false },\n      { label: 'Resume', href: 'https://drive.google.com/drive/folders/1zkHa4Ky08BzpkVYLyQJ6MZA9wUXLpPds?usp=sharing', active: false },\n      { label: 'Contact', href: 'Contact.dc.html', active: false },\n    ].map(item => ({\n      ...item,\n      color: item.active ? 'var(--accent)' : 'rgba(245,244,240,0.75)',\n      borderColor: item.active ? 'var(--accent)' : 'transparent',\n    }));\n\n    const badges = [\n      { label: 'FB', title: 'Federal Bank — Banking Sales' },\n      { label: 'L&T', title: 'L&T Finance — PM Intern, OCEN/ONDC' },\n      { label: 'PM', title: \"HelloPM — APM Program\" },\n    ];\n\n    const caseStudies = [\n      { id: 'checkout-ai', index: '01', tag: 'Fintech · Checkout', title: 'Razorpay — Smart Checkout AI', hook: 'Predicts the payment method most likely to succeed, before the customer picks one.', metric: 'Targets merchants losing up to ₹32,000/day to unresolved payment failures.', href: 'Case-Checkout-AI.dc.html' },\n      { id: 'sales-assistant', index: '02', tag: 'B2B · RAG Assistant', title: 'DealDesk — RAG Sales Assistant', hook: 'Gives sales reps cited, verified answers from company content, inside Slack, in seconds.', metric: 'GA target — 15%+ reduction in rep search time, 80%+ weekly active usage.', href: 'Case-Sales-Assistant.dc.html' },\n      { id: 'feed-mix', index: '03', tag: 'Recommender Systems', title: 'YouTube Feed Mix — Rediscover Shelf', hook: 'A feed-composition control that resurfaces dormant creators without hurting engagement.', metric: 'Target: +15 pts cross-recency click rate vs. control by week 8.', href: 'Case-Feed-Mix.dc.html' },\n      { id: 'moneymap', index: '04', tag: 'Personal Finance', title: 'MoneyMap — Financial Fluency Assistant', hook: 'Answers \"Can I afford this?\" using data you already have, not another dashboard.', metric: 'Targets 40% weekly active usage with a meaningful interaction by end of beta.', href: 'Case-MoneyMap.dc.html' },\n    ];\n\n    return {\n      isMobile,\n      mobileMenuOpen: this.state.mobileMenuOpen,\n      toggleMenu: this.toggleMenu,\n      closeMenu: this.closeMenu,\n      photoCardRef: this.photoCardRef,\n      handleCardMouseMove: this.handleCardMouseMove,\n      handleCardMouseLeave: this.handleCardMouseLeave,\n      accentHex,\n      navItems: nav,\n      badges,\n      heroGridCols: isMobile ? '1fr' : '1.25fr 1fr',\n      photoCardMinHeight: isMobile ? '380px' : '460px',\n      caseStudies,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
